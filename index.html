<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Purple Pepper Chatbot</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="chat-container">
    <header class="chat-header">
      <div class="avatar"><img src="assets/logo.png" alt="퍼플페퍼 로고" /></div>
      <div>
        <div class="title" id="companyTitle">Purple Pepper Chatbot</div>
        <div class="subtitle">궁금한 걸 물어보세요</div>
      </div>
    </header>

    <div class="messages" id="messages"></div>

    <div class="quick-questions" id="quickQuestions"></div>

    <form class="input-bar" id="inputForm">
      <input type="text" id="userInput" placeholder="예) 2층 와이파이 비번 알려줘" autocomplete="off" />
      <button type="submit">전송</button>
    </form>
  </div>

  <script src="data/qna.js"></script>
  <script src="script.js"></script>
</body>
</html>
