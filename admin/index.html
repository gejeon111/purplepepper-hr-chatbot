<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Purple Pepper Chatbot - Admin</title>
<link rel="stylesheet" href="/style.css" />
<link rel="stylesheet" href="/admin/admin.css" />
</head>
<body>
  <div class="admin-container">
    <header class="chat-header">
      <div class="avatar"><img src="/assets/logo.png" alt="퍼플페퍼 로고" /></div>
      <div>
        <div class="title">인사팀 문의 관리자</div>
        <div class="subtitle">접수된 문의를 확인하고 답장하세요</div>
      </div>
    </header>

    <div id="loginView" class="admin-panel">
      <p>관리자 비밀번호를 입력해주세요.</p>
      <input type="password" id="passwordInput" placeholder="비밀번호" />
      <button type="button" id="loginBtn">로그인</button>
      <div id="loginError" class="admin-error"></div>
    </div>

    <div id="dashboardView" class="admin-panel" style="display:none;">
      <div class="admin-tabs">
        <button type="button" class="admin-tab active" data-tab="tickets">문의 목록</button>
        <button type="button" class="admin-tab" data-tab="faq">FAQ 관리</button>
        <button type="button" class="admin-tab" data-tab="categories">카테고리 관리</button>
      </div>

      <div id="ticketsTab" class="admin-tab-panel">
        <div id="ticketList"></div>
      </div>

      <div id="faqTab" class="admin-tab-panel" style="display:none;">
        <div id="faqForm" class="faq-form">
          <select id="faqCategory"></select>
          <input type="text" id="faqQuestion" placeholder="질문 (예: 4층 와이파이 비밀번호가 뭔가요?)" />
          <textarea id="faqAnswer" placeholder="답변"></textarea>
          <input type="text" id="faqKeywords" placeholder="검색 키워드, 쉼표로 구분 (예: 4층, 와이파이, 비밀번호)" />
          <button type="button" id="faqAddBtn">FAQ 추가</button>
          <div id="faqFormError" class="admin-error"></div>
        </div>
        <div id="faqList"></div>
      </div>

      <div id="categoriesTab" class="admin-tab-panel" style="display:none;">
        <div class="faq-form">
          <input type="text" id="categoryLabel" placeholder="카테고리 이름 (예: 📅 회의실 예약)" />
          <button type="button" id="categoryAddBtn">카테고리 추가</button>
          <div id="categoryFormError" class="admin-error"></div>
        </div>
        <div id="categoryList"></div>
      </div>
    </div>
  </div>

  <script src="/admin/admin.js"></script>
</body>
</html>
